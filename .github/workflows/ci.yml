name: CI

# 재현성 스모크: 핀 고정된 requirements가 clean 머신에서 설치되고 113개 테스트가 통과하는지 검증.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Install pinned dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests (includes Streamlit smoke)
        run: pytest tests/ -q
